<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BITTRIXPAY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F8FAFC;
      overflow: hidden;
      transition: background 0.3s;
    }

    body.dark-mode {
      background: #000000;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      animation: fadeIn 0.8s ease-out;
    }

    .splash-logo {
      width: 100px;
      height: 100px;
      border-radius: 24px;
      object-fit: cover;
      animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 20px 60px rgba(124, 58, 237, 0.4);
    }

    .splash-name {
      font-size: 1.75rem;
      font-weight: 800;
      background: linear-gradient(135deg, #7C3AED 0%, #EC4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: slideUp 0.5s ease-out 0.4s forwards;
    }

    .splash-tagline {
      font-size: 0.85rem;
      color: rgba(30, 41, 59, 0.5);
      opacity: 0;
      animation: slideUp 0.5s ease-out 0.6s forwards;
    }

    body.dark-mode .splash-tagline {
      color: rgba(248, 250, 252, 0.5);
    }

    .splash-loader {
      margin-top: 2rem;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(124, 58, 237, 0.2);
      border-top-color: #7C3AED;
      border-radius: 50%;
      opacity: 0;
      animation: slideUp 0.3s ease-out 0.8s forwards, spin 0.8s linear 0.8s infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes scaleIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <img src="logo.jpeg" alt="BITTRIXPAY" class="splash-logo">
    <div class="splash-name">BITTRIXPAY</div>
    <div class="splash-tagline">Trade Smarter, Live Better</div>
    <div class="splash-loader"></div>
  </div>

  <script>
    if (localStorage.getItem('theme') !== 'light') {
      document.body.classList.add('dark-mode');
    }
  </script>
  <script src="app-database.js"></script>
  <script>
    async function initAndRedirect() {
      try {
        await AppDB.init();
        const auth = AppDB.getAuthStatus();

        setTimeout(() => {
          if (auth.authenticated) {
            window.location.href = 'dashboard.html';
          } else {
            window.location.href = 'register.html';
          }
        }, 2500);
      } catch (e) {
        // If DB init fails, just go to register after delay
        setTimeout(() => {
          window.location.href = 'register.html';
        }, 2500);
      }
    }

    initAndRedirect();
  </script>
</body>
</html>
